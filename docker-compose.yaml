services:
  daily-work-management:
    build:
      context: ./vps-app
      dockerfile: Dockerfile
    # Expose port inside Docker network — Coolify's Traefik connects directly
    expose:
      - "80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      # Coolify / Traefik routing
      - "coolify.managed=true"
      - "coolify.name=daily-work-management"
      - "coolify.port=80"
      - "traefik.enable=true"
      - "traefik.http.routers.daily-work.rule=Host(`njieta.org`) || Host(`www.njieta.org`)"
      - "traefik.http.routers.daily-work.entrypoints=https"
      - "traefik.http.routers.daily-work.tls=true"
      - "traefik.http.routers.daily-work.tls.certresolver=letsencrypt"
      - "traefik.http.services.daily-work.loadbalancer.server.port=80"
