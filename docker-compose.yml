services:
  daily-work-management:
    build:
      context: ./vps-app
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "coolify.managed=true"
      - "coolify.port=80"

networks:
  coolify:
    external: true
