services:
  daily-work-management:
    build:
      context: ./vps-app
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - coolify
    labels:
      - "coolify.managed=true"
      - "coolify.port=80"

networks:
  coolify:
    external: true
